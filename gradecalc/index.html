<!DOCTYPE html>
<html ng-app="gradecalc">
	<head>
		<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.5/angular.min.js"></script>
		<script src="app.js"></script>
		<link rel="stylesheet" href="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
	</head>

	<body>
		<div ng-controller="main" class="container">
			<form ng-submit="computeFinal()" class="form-horizontal" role="form">
				<table class="table table-striped">
					<tr>
						<th>Weight</th><th>Score</th>
					</tr>
					<tr ng-repeat="category in categories">
						<td><input ng-model="category.weight" type="number"></td>
						<td><input ng-model="category.score" type="number"></td>
					</tr>
					<tr>
						<td><a href="#" ng-click="addCategory()">Add a category</a></td>
						<td><a href="#" ng-click="calculateFinal()">Calculate final grade</a></td>
					</tr>
					<tr ng-show="totalPoints">
						<td>Total Points: {{totalPoints}}</td>
						<td>Earned Points: {{earnedPoints}}</td>
					</tr>
    			</table>
    		</form>
    		<h3 ng-show="finalGrade">Final Grade: {{finalGrade}}%</h3>
    	</div>
    </body>

</html>
